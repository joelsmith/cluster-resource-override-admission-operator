apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: croa-operator-allow-egress-to-api-server
spec:
  egress:
  - ports:
    - port: 6443
      protocol: TCP
    - port: 443
      protocol: TCP
  podSelector:
    matchLabels:
      clusterresourceoverride.operator: "true"
  policyTypes:
  - Egress
